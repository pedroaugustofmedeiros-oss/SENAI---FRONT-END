<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Formulário de Inscrição</title>
    <link rel="stylesheet" href="css/css5.css">
</head>
<body>

<div class="background">
    <div class="card">

        <div class="header">
            FORMULÁRIO DE INSCRIÇÃO
        </div>

        <form>
            <div class="row">
                <label>Nome</label>
                <div class="flex">
                    <input type="text" placeholder="Primeiro nome">
                    <input type="text" placeholder="Sobrenome">
                </div>
            </div>

            <div class="row">
                <label>Empresa</label>
                <input type="text">
            </div>

            <div class="row">
                <label>Email</label>
                <input type="email">
            </div>

            <div class="row">
                <label>Telefone</label>
                <div class="flex">
                    <input type="text" placeholder="DDD">
                    <input type="text" placeholder="Número">
                </div>
            </div>

            <div class="row">
                <label>Assunto</label>
                <select>
                    <option>Escolha uma opção</option>
                </select>
            </div>

            <div class="row">
                <label>Você já é cliente?</label>
                <div class="radio">
                    <label><input type="radio" name="cliente"> Sim</label>
                    <label><input type="radio" name="cliente"> Não</label>
                </div>
            </div>

            <button type="submit">REGISTRAR</button>
        </form>

    </div>
</div>

</body>
</html>
